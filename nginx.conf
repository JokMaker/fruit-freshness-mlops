events {}
http {
    server {
        listen 7860;
        location /api/ {
            proxy_pass http://localhost:8000/;
        }
        location / {
            proxy_pass http://localhost:8501/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
